name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.10.9"

      - name: Set up uv
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy .

  docker-test:
    name: Test Docker Build and Application
    runs-on: ubuntu-latest

    env:
      DJANGO_ALLOWED_HOSTS: 127.0.0.1
      DJANGO_SECRET_KEY: THIS_IS_A_TESTING_SECRET_KEY_ONLY
      ENVIRONMENT: Testing
      PORT: 8000

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          load: true
          tags: ff4kb:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker container
        run: |
          docker run -d --name ff4kb -p 8000:8000 \
            -e DJANGO_ALLOWED_HOSTS=${{ env.DJANGO_ALLOWED_HOSTS }} \
            -e DJANGO_SECRET_KEY=${{ env.DJANGO_SECRET_KEY }} \
            -e ENVIRONMENT=${{ env.ENVIRONMENT }} \
            -e PORT=${{ env.PORT }} \
            ff4kb:ci

      - name: Wait for application to start
        run: |
          for i in $(seq 1 30); do
            # Verify the container is still running
            if ! docker inspect --format='{{.State.Running}}' ff4kb 2>/dev/null | grep -q true; then
              echo "::error::Container exited unexpectedly on attempt $i/30"
              docker inspect --format='{{json .State}}' ff4kb 2>/dev/null || true
              docker logs ff4kb 2>&1 || true
              exit 1
            fi

            # Attempt a GET request (HEAD can behave differently with some WSGI servers)
            rc=0
            curl --silent --fail --max-time 5 --output /dev/null "http://127.0.0.1:8000/" || rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "Application is ready (attempt $i/30)"
              exit 0
            fi

            echo "Attempt $i/30: not ready (curl exit code $rc)"

            # On later attempts, run a verbose request to capture connection-level details
            if [ "$i" -ge 27 ]; then
              echo "--- Verbose curl output ---"
              curl --verbose --max-time 5 "http://127.0.0.1:8000/" 2>&1 || true
              echo "--- Container logs (last 10 lines) ---"
              docker logs --tail 10 ff4kb 2>&1 || true
            fi

            sleep 2
          done

          echo "::error::Application did not become ready within 60 seconds"
          echo "=== Failure Diagnostics ==="
          echo "--- Container State ---"
          docker inspect --format='{{json .State}}' ff4kb 2>/dev/null || true
          echo ""
          echo "--- Port Bindings ---"
          docker port ff4kb 2>/dev/null || true
          echo ""
          echo "--- Host Listening Ports ---"
          ss -tlnp 2>/dev/null | grep 8000 || echo "Port 8000 is NOT listening on the host"
          echo ""
          echo "--- Container Logs ---"
          docker logs ff4kb 2>&1 || true
          exit 1

      - name: Check application response
        run: |
          urls=(
            "http://127.0.0.1:8000/"
            "http://127.0.0.1:8000/static/css/style.css"
            "http://127.0.0.1:8000/guides/"
            "http://127.0.0.1:8000/routes/no64-excalbur/24/"
          )

          for url in "${urls[@]}" ; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$response" -eq 200 ]; then
              echo "$url is responding correctly with status code 200"
            else
              echo "$url is not responding as expected: $response"
              exit 1
            fi
          done

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "--- Container State ---"
          docker inspect --format='{{json .State}}' ff4kb 2>/dev/null || true
          echo ""
          echo "--- Container Logs ---"
          docker logs ff4kb 2>&1 || true
