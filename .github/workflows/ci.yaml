name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.10.9"

      - name: Set up uv
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy .

  docker-test:
    name: Test Docker Build and Application
    runs-on: ubuntu-latest

    env:
      DJANGO_ALLOWED_HOSTS: 127.0.0.1
      DJANGO_SECRET_KEY: THIS_IS_A_TESTING_SECRET_KEY_ONLY
      ENVIRONMENT: Testing
      PORT: 8000

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ff4kb:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker container
        run: |
          docker run -d --name ff4kb -p 8000:8000 \
            -e DJANGO_ALLOWED_HOSTS=${{ env.DJANGO_ALLOWED_HOSTS }} \
            -e DJANGO_SECRET_KEY=${{ env.DJANGO_SECRET_KEY }} \
            -e ENVIRONMENT=${{ env.ENVIRONMENT }} \
            -e PORT=${{ env.PORT }} \
            ff4kb:ci

      - name: Wait for application to start
        run: |
          max_retries=30
          counter=0
          until curl --head --silent --max-time 5 "http://127.0.0.1:8000" ; do
            if [ "$counter" -gt "$max_retries" ] ; then
              echo "Maximum attempts reached"
              docker logs ff4kb
              exit 1
            fi

            echo "Waiting for application to start..."
            sleep 2
            counter=$((counter+1))
          done

      - name: Check application response
        run: |
          urls=(
            "http://127.0.0.1:8000/"
            "http://127.0.0.1:8000/static/css/style.css"
            "http://127.0.0.1:8000/guides/"
            "http://127.0.0.1:8000/routes/no64-excalbur/24/"
          )

          for url in "${urls[@]}" ; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$response" -eq 200 ]; then
              echo "$url is responding correctly with status code 200"
            else
              echo "$url is not responding as expected: $response"
              exit 1
            fi
          done

      - name: Dump container logs on failure
        if: failure()
        run: docker logs ff4kb
